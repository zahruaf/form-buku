<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Pendaftaran Sekolah smk mu</title>
</head>
<body>

    <form>
        <fieldset>
            <h1>Form Pendaftaran</h1>

            <h2>Informasi Pribadi</h2>

            <table>
                <tr>
                    <td>Nama Lengkap:</td>
                    <td>
                        <input type="text" name="nama">
                    </td>
                </tr>

                <tr>
                    <td>Alamat:</td>
                    <td>
                        <textarea name="alamat"></textarea>
                    </td>
                </tr>

                <tr>
                    <td>Tanggal Lahir:</td>
                    <td>
                        <input type="date" name="tanggal_lahir">
                    </td>
                </tr>
            </table>

            <h2>Informasi Sekolah</h2>

            <table>
                <tr>
                    <td>Sekolah Asal:</td>
                    <td>
                        <input type="text" name="sekolah_asal">
                    </td>
                </tr>

                <tr>
                    <td>Kelas:</td>
                    <td>
                        <select name="kelas">
                            <option>Pilih Kelas</option>
                            <option>X</option>
                            <option>XI</option>
                            <option>XII</option>
                        </select>
                    </td>
                </tr>

                <tr>
                    <td>Jurusan:</td>
                    <td>
                        <input type="text" name="jurusan">
                    </td>
                </tr>

                <tr>
                    <td colspan="2" align="right">
                        <input type="submit" value="Daftar">
                    </td>
                </tr>
            </table>

        </fieldset>
    </form>

</body>
</html>
